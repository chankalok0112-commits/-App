<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>HKDSE 記憶大師</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 overscroll-none">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SUBJECTS = ['Chinese (中文)', 'English (英文)', 'Mathematics (數學)', 'Chemistry (化學)', 'History (歷史)', 'M2'];

    const REVIEW_SYSTEMS = {
      intense: { id: 'intense', name: '🔥 密集型', intervals: [1, 3, 7], labels: ['1 天', '3 天', '1 星期'], desc: '適合化學、M2等需要高頻記憶的知識。' },
      standard: { id: 'standard', name: '📚 標準型', intervals: [1, 7, 30], labels: ['1 天', '1 星期', '1 個月'], desc: '適合數學、中英文核心概念，穩打穩紮。' },
      macro: { id: 'macro', name: '🌍 宏觀型', intervals: [3, 14, 30], labels: ['3 天', '2 星期', '1 個月'], desc: '適合歷史等大概念，重溫整體脈絡。' }
    };

    const DEMO_CARDS = [
      { id: Date.now().toString(), subject: 'Chemistry (化學)', question: 'Esterification (酯化反應) 需要什麼 conditions (條件)？', answer: '1. Concentrated sulphuric acid (濃硫酸) 作為 catalyst\n2. Heating under reflux (回流加熱)', nextReviewDate: new Date().setHours(0, 0, 0, 0), system: 'intense', currentInterval: 0 },
      { id: (Date.now() + 1).toString(), subject: 'Mathematics (數學)', question: '什麼是 Discriminant (判別式) Δ 的公式？', answer: 'Δ = b² - 4ac', nextReviewDate: new Date().setHours(0, 0, 0, 0), system: 'standard', currentInterval: 0 }
    ];

    function App() {
      // --- 狀態管理 ---
      const [cards, setCards] = useState(() => {
        const saved = localStorage.getItem('hkdse_cards');
        if (saved) {
          try { return JSON.parse(saved); } catch(e) { return DEMO_CARDS; }
        }
        return DEMO_CARDS;
      });
      
      const [view, setView] = useState('dashboard');
      const [studyQueue, setStudyQueue] = useState([]);
      const [currentStudyIndex, setCurrentStudyIndex] = useState(0);
      const [isFlipped, setIsFlipped] = useState(false);
      const [showCustomInput, setShowCustomInput] = useState(false);
      const [customDays, setCustomDays] = useState('');
      const [toast, setToast] = useState('');

      const [addMode, setAddMode] = useState('single');
      const [newSubject, setNewSubject] = useState(SUBJECTS[0]);
      const [newQuestion, setNewQuestion] = useState('');
      const [newAnswer, setNewAnswer] = useState('');
      const [newSystem, setNewSystem] = useState('standard');
      const [batchText, setBatchText] = useState('');
      const [importText, setImportText] = useState('');

      const [notificationPermission, setNotificationPermission] = useState('default');

      // 🌅 新增：換日時間設定 (預設凌晨 4 點)
      const [dayEndHour, setDayEndHour] = useState(() => {
        const saved = localStorage.getItem('hkdse_day_end');
        return saved ? parseInt(saved, 10) : 4;
      });

      // 根據換日設定，獲取「邏輯上的今天」
      const getLogicalToday = () => {
        const now = new Date();
        if (now.getHours() < dayEndHour) {
          now.setDate(now.getDate() - 1);
        }
        now.setHours(0, 0, 0, 0);
        return now.getTime();
      };

      const [currentMonth, setCurrentMonth] = useState(new Date());
      const [selectedDate, setSelectedDate] = useState(getLogicalToday());

      // 保存卡片與換日時間的輔助函數
      const updateAndSaveCards = (newCards) => {
        setCards(newCards);
        localStorage.setItem('hkdse_cards', JSON.stringify(newCards));
      };

      useEffect(() => {
        localStorage.setItem('hkdse_day_end', dayEndHour.toString());
      }, [dayEndHour]);

      useEffect(() => {
        if (!localStorage.getItem('hkdse_cards')) {
          localStorage.setItem('hkdse_cards', JSON.stringify(DEMO_CARDS));
        }
      }, []);

      useEffect(() => {
        if ('Notification' in window) {
          setNotificationPermission(Notification.permission);
        }
      }, []);

      // 🎯 核心更新：自動順延過去未完成的任務 + 計算今日任務
      useEffect(() => {
        const logicalToday = getLogicalToday();
        
        // 檢查並將過去錯過的卡片，自動順延到今天
        let needsUpdate = false;
        const processedCards = cards.map(c => {
          if (c.nextReviewDate < logicalToday) {
            needsUpdate = true;
            return { ...c, nextReviewDate: logicalToday };
          }
          return c;
        });

        if (needsUpdate) {
          updateAndSaveCards(processedCards);
          return; // 讓 React 用新的資料重新渲染
        }

        if (view === 'dashboard') {
          const dueCards = cards.filter(card => card.nextReviewDate === logicalToday);
          setStudyQueue(dueCards);

          if (notificationPermission === 'granted' && dueCards.length > 0 && !sessionStorage.getItem('notified_today')) {
            new Notification('HKDSE 記憶大師', { body: `同學，你今天有 ${dueCards.length} 條 DSE 考點需要溫習！(Keep going!)` });
            sessionStorage.setItem('notified_today', 'true');
          }
        }
      }, [view, cards, dayEndHour, notificationPermission]);

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(''), 3000);
      };

      const requestNotificationPermission = () => {
        if (!('Notification' in window)) {
          showToast('你的 iPad 瀏覽器不支援推播通知。');
          return;
        }
        Notification.requestPermission().then((permission) => {
          setNotificationPermission(permission);
          if(permission === 'granted') showToast('已開啟溫習提醒！');
        });
      };

      // --- 學習邏輯 ---
      const startStudying = () => {
        if (studyQueue.length > 0) {
          setCurrentStudyIndex(0);
          setIsFlipped(false);
          setShowCustomInput(false);
          setView('study');
        }
      };

      const handleExplicitReview = (days) => {
        const currentCard = studyQueue[currentStudyIndex];
        // 以「邏輯上的今天」為基準加上天數
        const nextReviewDate = new Date(getLogicalToday());
        const intervalDays = parseInt(days, 10);
        nextReviewDate.setDate(nextReviewDate.getDate() + intervalDays);

        const updatedCards = cards.map(c => 
          c.id === currentCard.id 
            ? { ...c, nextReviewDate: nextReviewDate.getTime(), currentInterval: intervalDays } 
            : c
        );
        updateAndSaveCards(updatedCards);

        if (currentStudyIndex + 1 < studyQueue.length) {
          setCurrentStudyIndex(currentStudyIndex + 1);
          setIsFlipped(false);
          setShowCustomInput(false);
        } else {
          setView('dashboard');
          showToast('🎉 恭喜完成今日溫習任務！');
        }
      };

      // --- 新增與刪除 ---
      const handleAddSingleCard = (e) => {
        if (e && e.preventDefault) e.preventDefault();
        
        if (!newQuestion.trim() || !newAnswer.trim()) {
          showToast('❌ 請完整填寫問題與答案！');
          return;
        }

        const newCard = {
          id: Date.now().toString(),
          subject: newSubject,
          question: newQuestion,
          answer: newAnswer,
          nextReviewDate: getLogicalToday(), // 新卡片設定為「今天」溫習
          system: newSystem,
          currentInterval: 0
        };

        updateAndSaveCards([...cards, newCard]);
        setNewQuestion('');
        setNewAnswer('');
        showToast('✅ 成功新增 1 張卡片');
      };

      const handleBatchImport = () => {
        if (!batchText.trim()) {
          showToast('❌ 請輸入要匯入的內容！');
          return;
        }
        const lines = batchText.split('\n');
        let count = 0;
        const newCards = [];
        
        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];
          if (line.includes('---')) {
            const [q, a] = line.split('---');
            if (q.trim() && a.trim()) {
              newCards.push({
                id: (Date.now() + count).toString(),
                subject: newSubject,
                question: q.trim(),
                answer: a.trim(),
                nextReviewDate: getLogicalToday(),
                system: newSystem,
                currentInterval: 0
              });
              count++;
            }
          }
        }
        
        if (count > 0) {
          updateAndSaveCards([...cards, ...newCards]);
          setBatchText('');
          showToast(`✅ 成功批量匯入 ${count} 張卡片！`);
          setView('dashboard');
        } else {
          showToast('❌ 匯入失敗：請確保格式為「問題 --- 答案」');
        }
      };

      const handleDeleteCard = (cardId) => {
        const updatedCards = cards.filter(c => c.id !== cardId.toString());
        updateAndSaveCards(updatedCards);
        showToast('🗑️ 卡片已刪除');
      };

      const getAnalytics = () => {
        return SUBJECTS.map(sub => {
          const subCards = cards.filter(c => c.subject === sub);
          const total = subCards.length;
          const mastered = subCards.filter(c => c.currentInterval >= 7).length;
          const percentage = total === 0 ? 0 : Math.round((mastered / total) * 100);
          return { subject: sub, total, mastered, percentage };
        }).filter(stat => stat.total > 0); 
      };

      // --- 備份還原 ---
      const handleExport = async () => {
        const dataStr = JSON.stringify(cards, null, 2);
        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(dataStr);
            showToast('✅ 備份資料已複製！請貼上到備忘錄。');
          } else {
            const textArea = document.createElement("textarea");
            textArea.value = dataStr;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showToast('✅ 備份資料已複製！請貼上到備忘錄。');
          }
        } catch (err) {
          showToast('❌ 自動複製失敗，請手動選取下方文字複製。');
          setImportText(dataStr);
        }
      };

      const handleImport = () => {
        if (!importText.trim()) return;
        try {
          const importedCards = JSON.parse(importText);
          if (!Array.isArray(importedCards)) throw new Error("Format error");
          
          const cardsMap = new Map(cards.map(c => [c.id, c]));
          let count = 0;
          
          for (const card of importedCards) {
            if (card.id && card.question && card.answer) {
              cardsMap.set(card.id.toString(), card);
              count++;
            }
          }
          
          updateAndSaveCards(Array.from(cardsMap.values()));
          setImportText('');
          showToast(`✅ 成功還原/合併 ${count} 張卡片！`);
          setView('dashboard');
        } catch (error) {
          showToast('❌ 匯入失敗：資料格式不正確');
        }
      };

      // --- UI 組件 ---
      const renderDashboard = () => (
        <div className="flex flex-col items-center justify-center h-full space-y-6 animate-in fade-in zoom-in duration-300 w-full px-4">
          <div className="bg-white p-8 md:p-12 rounded-3xl shadow-lg text-center max-w-2xl w-full relative">
            <button onClick={requestNotificationPermission} className={`absolute top-6 right-6 p-3 rounded-full transition-colors cursor-pointer ${notificationPermission === 'granted' ? 'bg-green-100 text-green-600' : 'bg-gray-100 text-gray-400 hover:bg-blue-50 hover:text-blue-500'}`}>
              <i className="fas fa-bell text-xl pointer-events-none"></i>
            </button>

            <div className="bg-blue-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6">
              <i className="fas fa-brain text-blue-600 text-5xl"></i>
            </div>
            <h2 className="text-3xl md:text-4xl font-bold text-gray-800 mb-4">HKDSE 記憶大師</h2>
            <p className="text-gray-500 mb-8 text-base md:text-lg">資料已安全儲存於本機 iPad。</p>
            
            <div className="bg-gray-50 rounded-2xl p-8 mb-8 border border-gray-100">
              <p className="text-6xl md:text-7xl font-extrabold text-blue-600 mb-4">{studyQueue.length}</p>
              <p className="text-base md:text-lg font-medium text-gray-500">張卡片今日需溫習 (Due Today)</p>
            </div>

            <button onClick={startStudying} disabled={studyQueue.length === 0} className={`w-full py-5 rounded-2xl font-bold text-white transition-all text-xl cursor-pointer ${studyQueue.length > 0 ? 'bg-gray-900 hover:bg-gray-800 shadow-2xl transform hover:-translate-y-1' : 'bg-gray-300 cursor-not-allowed'}`}>
              {studyQueue.length > 0 ? '開始今日溫習 (Start Studying)' : '今日任務已清空 🎉'}
            </button>
          </div>
        </div>
      );

      const renderStudy = () => {
        const card = studyQueue[currentStudyIndex];
        const system = REVIEW_SYSTEMS[card.system] || REVIEW_SYSTEMS.standard;

        return (
          <div className="flex flex-col items-center justify-center h-full max-w-4xl mx-auto px-4 pb-10 w-full">
            <div className="w-full flex justify-between items-center mb-6 text-gray-500 px-2">
              <span className="font-medium text-lg md:text-xl">進度: {currentStudyIndex + 1} / {studyQueue.length}</span>
              <div className="flex space-x-3">
                <span className="bg-blue-100 text-blue-700 px-4 py-1.5 rounded-full text-sm md:text-base font-bold">{card.subject}</span>
                <span className="bg-gray-100 text-gray-600 px-4 py-1.5 rounded-full text-sm md:text-base font-bold">{system.name.split(' ')[1]}</span>
              </div>
            </div>

            <div className={`w-full min-h-[350px] md:min-h-[400px] bg-white rounded-3xl shadow-xl p-8 md:p-12 flex flex-col justify-center items-center text-center cursor-pointer transition-all duration-300 transform ${isFlipped ? 'rotate-0' : ''}`} onClick={() => !isFlipped && setIsFlipped(true)}>
              {!isFlipped ? (
                <>
                  <h3 className="text-base md:text-lg font-bold text-gray-400 mb-6 uppercase tracking-wider">Question</h3>
                  <p className="text-3xl md:text-4xl font-medium text-gray-800 leading-relaxed whitespace-pre-wrap">{card.question}</p>
                  <p className="mt-10 text-base md:text-lg text-gray-400 animate-pulse bg-gray-50 px-6 py-3 rounded-full pointer-events-none">點擊卡片顯示答案</p>
                </>
              ) : (
                <>
                  <h3 className="text-base md:text-lg font-bold text-green-500 mb-6 uppercase tracking-wider">Answer</h3>
                  <p className="text-2xl md:text-3xl font-medium text-gray-800 leading-relaxed whitespace-pre-wrap">{card.answer}</p>
                </>
              )}
            </div>

            {isFlipped && (
              <div className="w-full mt-8 bg-white p-6 md:p-8 rounded-3xl shadow-lg border border-gray-100 animate-in slide-in-from-bottom-4">
                <p className="text-center text-base md:text-lg text-gray-500 mb-6 font-medium flex justify-center items-center">
                  你想多久後再溫習？ <span className="ml-3 text-sm md:text-base bg-gray-100 px-3 py-1 rounded-lg text-gray-600">目前使用: {system.name}</span>
                </p>
                {!showCustomInput ? (
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                    {system.intervals.map((days, index) => (
                      <button key={days} onClick={() => handleExplicitReview(days)} className="flex flex-col items-center justify-center p-5 md:p-6 bg-blue-50 hover:bg-blue-100 border border-blue-200 rounded-2xl transition-colors cursor-pointer">
                        <span className="font-bold text-blue-700 text-lg md:text-xl whitespace-nowrap pointer-events-none">{system.labels[index]}</span>
                      </button>
                    ))}
                    <button onClick={() => setShowCustomInput(true)} className="flex flex-col items-center justify-center p-5 md:p-6 bg-gray-50 hover:bg-gray-100 border border-gray-200 rounded-2xl transition-colors cursor-pointer">
                      <i className="fas fa-clock text-gray-500 text-2xl md:text-3xl mb-2 pointer-events-none"></i>
                      <span className="font-bold text-gray-600 text-sm md:text-base pointer-events-none">自訂天數</span>
                    </button>
                  </div>
                ) : (
                  <div className="flex items-center space-x-4 bg-gray-50 p-4 rounded-2xl">
                    <input type="number" min="1" value={customDays} onChange={(e) => setCustomDays(e.target.value)} placeholder="輸入天數" className="flex-1 border border-gray-300 rounded-xl p-4 text-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-center" />
                    <span className="text-gray-600 text-lg font-medium whitespace-nowrap">天後</span>
                    <button onClick={() => { if(customDays && !isNaN(customDays) && customDays > 0) handleExplicitReview(customDays); }} className="bg-gray-900 text-white px-8 py-4 rounded-xl font-bold text-lg hover:bg-gray-800 cursor-pointer">確定</button>
                    <button onClick={() => setShowCustomInput(false)} className="bg-gray-200 text-gray-700 px-6 py-4 rounded-xl font-bold text-lg hover:bg-gray-300 cursor-pointer">返回</button>
                  </div>
                )}
              </div>
            )}
          </div>
        );
      };

      const renderAdd = () => (
        <div className="flex flex-col items-center h-full max-w-3xl mx-auto px-4 pb-10 w-full">
          <div className="bg-white w-full rounded-3xl shadow-lg p-6 md:p-10">
            <h2 className="text-2xl md:text-3xl font-bold text-gray-800 mb-8 flex items-center">
              <i className="fas fa-plus text-blue-600 mr-4 text-2xl md:text-3xl"></i> 新增考點卡片
            </h2>

            <div className="flex bg-gray-100 p-1.5 rounded-2xl mb-8">
              <button onClick={() => setAddMode('single')} className={`flex-1 py-3 font-bold text-base md:text-lg rounded-xl transition-colors flex items-center justify-center cursor-pointer ${addMode === 'single' ? 'bg-white text-blue-600 shadow' : 'text-gray-500'}`}>
                <i className="fas fa-file-alt mr-2 text-lg pointer-events-none"></i> 單張新增
              </button>
              <button onClick={() => setAddMode('batch')} className={`flex-1 py-3 font-bold text-base md:text-lg rounded-xl transition-colors flex items-center justify-center cursor-pointer ${addMode === 'batch' ? 'bg-white text-blue-600 shadow' : 'text-gray-500'}`}>
                <i className="fas fa-list mr-2 text-lg pointer-events-none"></i> 批量匯入
              </button>
            </div>

            <div className="space-y-6 md:space-y-8">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
                <div>
                  <label className="block text-base md:text-lg font-medium text-gray-700 mb-2">Subject (科目)</label>
                  <select value={newSubject} onChange={(e) => setNewSubject(e.target.value)} className="w-full border border-gray-300 rounded-xl p-3 md:p-4 text-base md:text-lg focus:ring-2 focus:ring-blue-500 bg-white cursor-pointer">
                    {SUBJECTS.map(sub => <option key={sub} value={sub}>{sub}</option>)}
                  </select>
                </div>
                
                <div>
                  <label className="block text-base md:text-lg font-medium text-gray-700 mb-2">System (溫習系統選擇)</label>
                  <div className="space-y-3">
                    {Object.values(REVIEW_SYSTEMS).map(sys => (
                      <label key={sys.id} className={`flex items-start p-4 border rounded-xl cursor-pointer transition-all ${newSystem === sys.id ? 'border-blue-500 bg-blue-50 ring-2 ring-blue-500' : 'border-gray-200 hover:bg-gray-50'}`}>
                        <input type="radio" name="system" value={sys.id} checked={newSystem === sys.id} onChange={(e) => setNewSystem(e.target.value)} className="mt-1 mr-4 w-5 h-5 text-blue-600 focus:ring-blue-500 cursor-pointer" />
                        <div>
                          <div className="font-bold text-gray-800 text-base md:text-lg">{sys.name}</div>
                          <div className="text-sm md:text-base text-gray-500 mt-1">{sys.desc}</div>
                          <div className="text-sm md:text-base font-semibold text-blue-600 mt-2">節奏: {sys.labels.join(' ➔ ')}</div>
                        </div>
                      </label>
                    ))}
                  </div>
                </div>
              </div>

              {addMode === 'single' ? (
                <div className="space-y-6 mt-6">
                  <div>
                    <label className="block text-base md:text-lg font-medium text-gray-700 mb-2">Question (問題)</label>
                    <textarea rows="2" value={newQuestion} onChange={(e) => setNewQuestion(e.target.value)} className="w-full border border-gray-300 rounded-xl p-4 text-base md:text-lg focus:ring-2 focus:ring-blue-500 resize-none" placeholder="輸入考點..." />
                  </div>
                  <div>
                    <label className="block text-base md:text-lg font-medium text-gray-700 mb-2">Answer (答案)</label>
                    <textarea rows="4" value={newAnswer} onChange={(e) => setNewAnswer(e.target.value)} className="w-full border border-gray-300 rounded-xl p-4 text-base md:text-lg focus:ring-2 focus:ring-blue-500 resize-none" placeholder="輸入答案..." />
                  </div>
                  <button type="button" onClick={handleAddSingleCard} className="w-full bg-gray-900 text-white font-bold py-4 md:py-5 text-lg md:text-xl rounded-xl hover:bg-gray-800 transition-colors shadow-lg mt-4 cursor-pointer">
                    儲存卡片 (Save)
                  </button>
                </div>
              ) : (
                <div className="space-y-6">
                  <div className="bg-blue-50 p-4 md:p-5 rounded-xl text-base text-blue-800 flex items-start border border-blue-100">
                    <i className="fas fa-info-circle text-blue-500 mr-3 flex-shrink-0 mt-1 text-xl"></i>
                    <p>請使用 <strong className="text-xl px-1">---</strong> 分隔問題與答案，每組一列。<br/><span className="text-sm md:text-base text-blue-600 mt-2 block">範例：<br/>什麼是 GDP？ --- 國內生產總值<br/>Esterification 的催化劑？ --- 濃硫酸</span></p>
                  </div>
                  <textarea rows="8" value={batchText} onChange={(e) => setBatchText(e.target.value)} className="w-full border border-gray-300 rounded-xl p-4 text-base md:text-lg focus:ring-2 focus:ring-blue-500 resize-none font-mono" placeholder="問題 1 --- 答案 1&#10;問題 2 --- 答案 2" />
                  <button onClick={handleBatchImport} className="w-full bg-blue-600 text-white font-bold py-4 md:py-5 text-lg md:text-xl rounded-xl hover:bg-blue-700 transition-colors shadow-lg cursor-pointer">
                    一鍵批量匯入 (Batch Import)
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      );

      const renderAnalytics = () => {
        const stats = getAnalytics();
        return (
          <div className="flex flex-col h-full w-full pb-10 max-w-4xl mx-auto px-4">
            <h2 className="text-2xl md:text-3xl font-bold text-gray-800 mb-8 flex items-center">
              <i className="fas fa-chart-bar text-blue-600 mr-4 text-2xl md:text-3xl"></i> 弱點分析 (Analytics)
            </h2>
            
            <div className="bg-white rounded-3xl shadow-sm border border-gray-100 p-6 md:p-10 mb-8">
              <p className="text-base md:text-lg text-gray-500 mb-6">「精通度」代表你對該科目的掌握程度（卡片間隔時間達到 7 天以上）。努力將弱勢科目的進度條推向 100% 吧！</p>
              {stats.length === 0 ? (
                <div className="text-center text-gray-400 py-8 font-medium text-lg">目前尚無足夠數據，請先新增並溫習卡片！</div>
              ) : (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
                  {stats.map(stat => (
                    <div key={stat.subject} className="bg-gray-50 p-5 rounded-2xl border border-gray-100">
                      <div className="flex justify-between items-end mb-3">
                        <span className="font-bold text-gray-800 text-lg">{stat.subject}</span>
                        <span className="text-sm md:text-base font-bold text-gray-500">{stat.mastered} / {stat.total} 題 ({stat.percentage}%)</span>
                      </div>
                      <div className="w-full bg-gray-200 rounded-full h-4 overflow-hidden">
                        <div className={`h-4 rounded-full transition-all duration-1000 ${stat.percentage >= 80 ? 'bg-green-500' : stat.percentage >= 50 ? 'bg-blue-500' : 'bg-orange-500'}`} style={{ width: `${stat.percentage}%` }}></div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="bg-white rounded-3xl shadow-sm border border-gray-100 p-6 md:p-10">
               <h3 className="text-xl md:text-2xl font-bold text-gray-800 mb-6">全部題庫管理</h3>
               <div className="max-h-80 overflow-y-auto space-y-3 pr-2">
                 {cards.length === 0 ? <p className="text-gray-400 text-base md:text-lg">暫無卡片</p> : 
                   cards.map(card => (
                     <div key={card.id} className="flex justify-between items-center bg-gray-50 p-4 rounded-xl border border-gray-100">
                       <div className="flex-1 truncate pr-6">
                         <span className="text-sm md:text-base text-blue-600 font-bold bg-blue-100 px-3 py-1 rounded-md mr-3">{card.subject.split(' ')[0]}</span>
                         <span className="text-base md:text-lg text-gray-700">{card.question}</span>
                       </div>
                       <button onClick={() => handleDeleteCard(card.id)} className="p-3 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-xl transition-colors cursor-pointer">
                         <i className="fas fa-trash-alt text-lg pointer-events-none"></i>
                       </button>
                     </div>
                   ))
                 }
               </div>
            </div>
          </div>
        );
      };

      const renderCalendar = () => {
        const logicalToday = getLogicalToday();
        const year = currentMonth.getFullYear();
        const month = currentMonth.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const firstDayOfMonth = new Date(year, month, 1).getDay();
        const daysArray = Array.from({ length: daysInMonth }, (_, i) => i + 1);
        const blanksArray = Array.from({ length: firstDayOfMonth }, (_, i) => i);
        const cardsForSelectedDate = cards.filter(card => new Date(card.nextReviewDate).setHours(0,0,0,0) === selectedDate);
        const nextMonth = () => setCurrentMonth(new Date(year, month + 1, 1));
        const prevMonth = () => setCurrentMonth(new Date(year, month - 1, 1));

        return (
          <div className="flex flex-col h-full w-full pb-10 max-w-4xl mx-auto px-4">
            <h2 className="text-2xl md:text-3xl font-bold text-gray-800 mb-8 flex items-center">
              <i className="fas fa-calendar-alt text-blue-600 mr-4 text-2xl md:text-3xl"></i> 溫習日曆 (Schedule)
            </h2>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 w-full">
              
              <div className="w-full">
                <div className="bg-white rounded-t-3xl shadow-sm border border-gray-100 p-6 pb-0">
                  <div className="flex justify-between items-center mb-6">
                    <button onClick={prevMonth} className="p-3 hover:bg-gray-100 rounded-full cursor-pointer"><i className="fas fa-chevron-left text-gray-600 text-xl pointer-events-none"></i></button>
                    <h3 className="text-xl md:text-2xl font-bold text-gray-800">{currentMonth.toLocaleDateString('en-HK', { month: 'long', year: 'numeric' })}</h3>
                    <button onClick={nextMonth} className="p-3 hover:bg-gray-100 rounded-full cursor-pointer"><i className="fas fa-chevron-right text-gray-600 text-xl pointer-events-none"></i></button>
                  </div>
                  <div className="grid grid-cols-7 text-center mb-3">
                    {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d => <div key={d} className="text-sm font-bold text-gray-400">{d}</div>)}
                  </div>
                </div>
                <div className="bg-white rounded-b-3xl shadow-sm border border-t-0 border-gray-100 p-6 pt-0">
                  <div className="grid grid-cols-7 gap-2 md:gap-3">
                    {blanksArray.map(b => <div key={`blank-${b}`} className="p-3"></div>)}
                    {daysArray.map(day => {
                      const dateTimestamp = new Date(year, month, day).setHours(0,0,0,0);
                      const isSelected = selectedDate === dateTimestamp;
                      // 修改：日曆上的「今天」改以邏輯換日為準
                      const isToday = dateTimestamp === logicalToday;
                      const cardsDue = cards.filter(c => new Date(c.nextReviewDate).setHours(0,0,0,0) === dateTimestamp).length;

                      return (
                        <div key={day} onClick={() => setSelectedDate(dateTimestamp)} className={`flex flex-col items-center justify-center p-3 md:p-4 rounded-2xl cursor-pointer transition-colors min-h-[60px] md:min-h-[70px] ${isSelected ? 'bg-blue-600 text-white shadow-lg' : 'hover:bg-blue-50 text-gray-700 bg-gray-50'} ${isToday && !isSelected ? 'ring-2 ring-blue-300' : ''}`}>
                          <span className={`text-base md:text-lg font-bold pointer-events-none ${isSelected ? 'text-white' : ''}`}>{day}</span>
                          {cardsDue > 0 && (
                            <div className="flex space-x-1.5 mt-2 pointer-events-none">
                              <div className={`w-2 h-2 rounded-full ${isSelected ? 'bg-white' : 'bg-red-500'}`}></div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

              <div className="w-full">
                <h3 className="text-xl md:text-2xl font-bold text-gray-800 mb-6 flex justify-between items-center">
                  任務清單 ({new Date(selectedDate).toLocaleDateString('zh-HK', { month: 'short', day: 'numeric' })})
                  <span className="text-base md:text-lg font-medium bg-blue-100 text-blue-700 px-3 py-1.5 rounded-xl">{cardsForSelectedDate.length} 題</span>
                </h3>
                {cardsForSelectedDate.length === 0 ? (
                  <div className="bg-gray-50 rounded-3xl p-10 text-center text-gray-500 border border-gray-100 text-lg">這天沒有需要溫習的任務！</div>
                ) : (
                  <div className="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                    {cardsForSelectedDate.map(card => (
                      <div key={card.id} className="bg-white p-5 md:p-6 rounded-2xl border border-gray-200 shadow-sm flex flex-col hover:border-blue-300 transition-colors cursor-pointer">
                        <div className="flex justify-between items-start mb-3">
                          <span className="text-sm md:text-base font-bold text-blue-700 bg-blue-50 px-3 py-1 rounded-lg">{card.subject}</span>
                          <span className="text-sm md:text-base font-medium text-gray-400 border px-3 py-1 rounded-full">{REVIEW_SYSTEMS[card.system]?.name.split(' ')[1] || '預設'}</span>
                        </div>
                        <p className="text-base md:text-lg text-gray-800 font-medium">{card.question}</p>
                      </div>
                    ))}
                  </div>
                )}
              </div>

            </div>
          </div>
        );
      };

      const renderSettings = () => (
        <div className="flex flex-col h-full w-full pb-10 max-w-3xl mx-auto px-4 animate-in fade-in zoom-in duration-300">
          <h2 className="text-2xl md:text-3xl font-bold text-gray-800 mb-8 flex items-center">
            <i className="fas fa-cog text-blue-600 mr-4 text-2xl md:text-3xl"></i> 系統設定與備份
          </h2>
          <div className="bg-white rounded-3xl shadow-sm border border-gray-100 p-8 md:p-12 mb-8">
            
            {/* 🌙 夜貓子作息設定區塊 */}
            <div className="mb-10">
              <label className="block text-lg md:text-xl font-bold text-gray-700 mb-3">🌙 夜貓子作息設定 (Day End Time)</label>
              <p className="text-sm md:text-base text-gray-500 mb-4">如果你習慣熬夜，請設定「新一天」的開始時間。例如設定凌晨 4 點，那凌晨 2 點溫習依然會算在「昨天」的任務中！</p>
              <select 
                value={dayEndHour} 
                onChange={(e) => {
                  setDayEndHour(parseInt(e.target.value, 10));
                  showToast('✅ 作息時間已更新！');
                }} 
                className="w-full border border-gray-300 rounded-xl p-4 md:p-5 focus:ring-2 focus:ring-blue-500 bg-white cursor-pointer text-base md:text-lg font-bold text-blue-700"
              >
                <option value={0}>00:00 (午夜 12 點換日)</option>
                <option value={1}>01:00 AM 換日</option>
                <option value={2}>02:00 AM 換日</option>
                <option value={3}>03:00 AM 換日</option>
                <option value={4}>04:00 AM 換日 (建議夜貓子使用)</option>
                <option value={5}>05:00 AM 換日</option>
              </select>
            </div>

            <div className="border-t border-gray-100 pt-8">
              <h3 className="text-xl md:text-2xl font-bold text-gray-800 mb-4">本機儲存防走失</h3>
              <p className="text-base md:text-lg text-gray-500 mb-6">雖然資料已安全儲存於 iPad 內部，但仍強烈建議定期點擊下方按鈕備份進度到 iPad 備忘錄 (Notes)，以免更換設備時遺失。</p>
              <button onClick={handleExport} className="w-full flex items-center justify-center bg-gray-900 text-white font-bold py-4 md:py-5 rounded-2xl hover:bg-gray-800 transition-colors shadow-lg mb-8 text-lg md:text-xl cursor-pointer">
                <i className="fas fa-download mr-3 text-xl pointer-events-none"></i> 點擊複製所有進度 (Export)
              </button>
            </div>

            <div className="border-t border-gray-100 pt-8">
              <label className="block text-lg md:text-xl font-bold text-gray-700 mb-3">還原資料 (Import)</label>
              <p className="text-sm md:text-base text-gray-400 mb-4">把之前備份的代碼貼在下面，按還原即可合併資料：</p>
              <textarea rows="5" value={importText} onChange={(e) => setImportText(e.target.value)} className="w-full border border-gray-300 rounded-xl p-4 md:p-5 focus:ring-2 focus:ring-blue-500 resize-none font-mono text-sm md:text-base mb-4 text-gray-600 bg-gray-50" placeholder="在此貼上你之前備份的代碼..." />
              <button onClick={handleImport} className="w-full flex items-center justify-center bg-blue-600 text-white font-bold py-4 md:py-5 rounded-2xl hover:bg-blue-700 transition-colors shadow-lg text-lg md:text-xl cursor-pointer">
                <i className="fas fa-upload mr-3 text-xl pointer-events-none"></i> 還原我的資料 (Restore)
              </button>
            </div>
          </div>
        </div>
      );

      return (
        <div className="bg-slate-50 min-h-screen font-sans text-gray-900 pb-24 md:pb-28 relative w-full overflow-x-hidden flex flex-col">
          {toast && (
            <div className="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 bg-gray-900 text-white px-8 py-4 rounded-full font-bold shadow-2xl flex items-center text-lg whitespace-nowrap">
              <i className="fas fa-check-circle text-green-400 mr-3 text-xl"></i> {toast}
            </div>
          )}

          <header className="bg-white shadow-sm sticky top-0 z-40 w-full">
            <div className="w-full max-w-5xl mx-auto px-6 h-20 flex items-center justify-between">
              <h1 className="font-extrabold text-2xl md:text-3xl tracking-tight flex items-center">
                <span className="bg-blue-600 text-white px-3 py-1.5 rounded-xl mr-3">DSE</span> 
                Spaced Repetition
              </h1>
              <div className="text-base md:text-lg font-medium text-gray-500 bg-gray-100 px-4 py-2 rounded-full flex items-center">
                題庫: <span className="font-bold text-blue-600 ml-2">{cards.length}</span>
              </div>
            </div>
          </header>

          <main className="pt-8 md:pt-12 flex-1 overflow-y-auto w-full max-w-5xl mx-auto px-2">
            {view === 'dashboard' && renderDashboard()}
            {view === 'study' && renderStudy()}
            {view === 'add' && renderAdd()}
            {view === 'calendar' && renderCalendar()}
            {view === 'analytics' && renderAnalytics()}
            {view === 'settings' && renderSettings()}
          </main>

          <nav className="fixed bottom-0 w-full bg-white border-t border-gray-200 z-50 shadow-[0_-10px_20px_-5px_rgba(0,0,0,0.05)] pb-safe">
            <div className="w-full max-w-3xl mx-auto flex justify-between px-4">
              <button onClick={() => setView('dashboard')} className={`flex-1 flex flex-col items-center py-4 cursor-pointer ${view === 'dashboard' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}>
                <i className="fas fa-home text-2xl md:text-3xl mb-2 pointer-events-none"></i>
                <span className="text-xs md:text-sm font-bold pointer-events-none">主頁</span>
              </button>
              <button onClick={() => setView('calendar')} className={`flex-1 flex flex-col items-center py-4 cursor-pointer ${view === 'calendar' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}>
                <i className="fas fa-calendar-alt text-2xl md:text-3xl mb-2 pointer-events-none"></i>
                <span className="text-xs md:text-sm font-bold pointer-events-none">日曆</span>
              </button>
              
              <button onClick={() => setView('add')} className={`flex-1 flex flex-col items-center py-3 relative cursor-pointer`}>
                <div className={`absolute -top-6 bg-blue-600 text-white p-4 md:p-5 rounded-full shadow-xl border-4 md:border-8 border-slate-50 transition-transform pointer-events-none ${view === 'add' ? 'scale-110' : 'hover:scale-105'}`}>
                  <i className="fas fa-plus text-2xl md:text-3xl"></i>
                </div>
                <span className={`text-xs md:text-sm font-bold mt-10 md:mt-12 pointer-events-none ${view === 'add' ? 'text-blue-600' : 'text-gray-400'}`}>新增</span>
              </button>
              
              <button onClick={() => setView('analytics')} className={`flex-1 flex flex-col items-center py-4 cursor-pointer ${view === 'analytics' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}>
                <i className="fas fa-chart-bar text-2xl md:text-3xl mb-2 pointer-events-none"></i>
                <span className="text-xs md:text-sm font-bold pointer-events-none">數據</span>
              </button>
              <button onClick={() => setView('settings')} className={`flex-1 flex flex-col items-center py-4 cursor-pointer ${view === 'settings' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}>
                <i className="fas fa-cog text-2xl md:text-3xl mb-2 pointer-events-none"></i>
                <span className="text-xs md:text-sm font-bold pointer-events-none">設定</span>
              </button>
            </div>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>
    .pb-safe {
      padding-bottom: env(safe-area-inset-bottom, 16px);
    }
  </style>
</body>
</html>
